version: '3.8'

# --- NETWORKS ---
networks:
  public-gateway: 
    driver: bridge
  internal-mesh:  
    driver: bridge

# --- VOLUMES ---
volumes:
  postgres_data:
  mongo_data:
  redis_data:
  prometheus_data:
  grafana_data:

services:
  # 1. THE RELATIONAL STORE (SQL)
  postgres:
    image: postgres:15-alpine
    container_name: infra_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    networks:
      - internal-mesh
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. THE DOCUMENT STORE (NoSQL)
  mongodb:
    image: mongo:latest
    container_name: infra_mongo
    restart: always
    ports:
      - "27017:27017"
    networks:
      - internal-mesh
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. THE MESSAGE BROKER & CACHE
  redis:
    image: redis:alpine
    container_name: infra_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    networks:
      - internal-mesh
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 4. MONITORING & VISUALIZATION
  prometheus:
    image: prom/prometheus:latest
    container_name: infra_prometheus
    restart: always
    networks:
      - internal-mesh
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: infra_grafana
    restart: always
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    networks:
      - internal-mesh
    volumes:
      - grafana_data:/var/lib/grafana

  # --- APPLICATION MICROSERVICES ---

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gateway-service
    ports:
      - "8080:8080"
    networks:
      - public-gateway
      - internal-mesh
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://infra_redis:6379
      - NODE_ENV=production

  ingestor-service:
    build:
      context: .
      dockerfile: services/ingestor-service/Dockerfile
    container_name: ingestor-service
    networks:
      - internal-mesh
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://infra_redis:6379
      - CRICKET_API_KEY=${CRICKET_API_KEY}

  poll-service:
    build:
      context: .
      dockerfile: services/poll-service/Dockerfile
    container_name: poll_service
    networks:
      - internal-mesh
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://infra_redis:6379

  room-service:
    build:
      context: .
      dockerfile: services/room-service/Dockerfile
    container_name: room_service
    networks:
      - internal-mesh
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://infra_redis:6379
      - MONGO_URI=mongodb://infra_mongo:27017/match_polls